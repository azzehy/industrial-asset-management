spring:
  application:
    name: machine-service
  data:
    mongodb:
      uri: mongodb://root:password@localhost:27017/machine-service?authSource=admin

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  metrics:
    distribution:
      percentiles-histogram:
        http:
          server:
            requests: true
  observations:
    key-values:
      application: machine-service
  tracing:
    sampling:
      probability: 1.0